<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi guys :]</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Baskervville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="hero">
      <h1>Marten Selection!!!</h1>
      <p>Select which member of the genus <em>Martes</em> you want to know more about!</p>
    </header>
    <main>
      <section class="martens">
        <div class="card">
          <p><em>Martes foina</em>, the Beech Marten</p>
          <img src="assets/images/beech.png" alt="beech">
        </div>
        <div class="card">
          <p><em>Martes martes</em>, the European Pine Marten</p>
          <img src="assets/images/pinemarten.png" alt="europeanpine">
        </div>
        <div class="card">
        <p><em>Martes flavigula</em>, the Yellow-throated Marten</p>
          <img src="assets/images/yellowthroated.png" alt="yellowthroated">
        </div>
      </section>

      <section class="ground">
        <button class="button">See more martens!</button>
      </section>
    </main>

    <footer>
      <p>Made by Azrael Mauck, 2026</p>
    </footer>
  

</body>
</html>
